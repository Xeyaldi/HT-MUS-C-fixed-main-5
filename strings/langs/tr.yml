sug_0 : "❓**Bᴜɴᴜ Bɪʟɪʏᴏʀ ᴍᴜsᴜɴ?**\n\n✅ "
sug_1 : "Dᴏğʀᴜᴅᴀɴ Mᴏᴅ ᴠᴇ Sᴀᴛıʀ İçɪ Mᴏᴅ ᴏʟᴍᴀᴋ üᴢᴇʀᴇ ɪᴋɪ **ᴀʀᴀᴍᴀ ᴍᴏᴅᴜɴᴅᴀ** ᴍüᴢɪᴋ çᴀʟᴀʙɪʟɪʀsɪɴɪᴢ.\n\nMᴏᴅʟᴀʀı /playmode ɪʟᴇ ᴅᴇğɪşᴛɪʀɪɴ"
sug_2 : "Hᴇʀᴋᴇs Mᴏᴅᴜ ᴠᴇ Yöɴᴇᴛɪᴄɪ Mᴏᴅᴜ ᴏʟᴍᴀᴋ üᴢᴇʀᴇ ɪᴋɪ **çᴀʟᴍᴀ ᴛüʀüɴᴅᴇ** ᴍüᴢɪᴋ çᴀʟᴀʙɪʟɪʀsɪɴɪᴢ.\n\nMᴏᴅʟᴀʀı /playmode ɪʟᴇ ᴅᴇğɪşᴛɪʀɪɴ"
sug_3 : "**Kᴀɴᴀʟʟᴀʀᴅᴀ** ᴅᴀ ᴍüᴢɪᴋ çᴀʟᴀʙɪʟɪʀsɪɴɪᴢ.\n\nᴋᴀɴᴀʟ_ɪᴅ'ʏɪ /channelplay ɪʟᴇ ᴀʏᴀʀʟᴀʏıɴ ᴠᴇ /cplay ɪʟᴇ çᴀʟıɴ "
sug_4 : "Yöɴᴇᴛɪᴄɪ ᴏʟᴍᴀʏᴀɴʟᴀʀ ᴅᴀ **YETKİLİ KULLANICILAR LİSTESİ**'ɴᴇ ᴇᴋʟᴇɴᴇʀᴇᴋ ʏöɴᴇᴛɪᴄɪ ᴋᴏᴍᴜᴛʟᴀʀıɴı ᴋᴜʟʟᴀɴᴀʙɪʟɪʀ. \nBɪʀ ᴋᴜʟʟᴀɴıᴄıʏı /auth ɪʟᴇ ʏᴇᴛᴋɪ ʟɪsᴛᴇsɪɴᴇ ᴇᴋʟᴇʏɪɴ, /unauth ɪʟᴇ çıᴋᴀʀıɴ ᴠᴇ /authusers ɪʟᴇ ʏᴇᴛᴋɪʟɪ ᴋᴜʟʟᴀɴıᴄıʟᴀʀı ᴋᴏɴᴛʀᴏʟ ᴇᴅɪɴ"
sug_5 : "Bᴏᴛᴛᴀ **Tᴇᴍɪᴢ Mᴏᴅ** ᴀᴅıɴᴅᴀ ʙɪʀ öᴢᴇʟʟɪᴋ ᴠᴀʀ.\nBᴏᴛᴜɴ ᴍᴇsᴀᴊʟᴀʀıɴı 5 ᴅᴀᴋɪᴋᴀ sᴏɴʀᴀ sɪʟᴇʀ ᴠᴇ sᴏʜʙᴇᴛɪɴɪᴢɪɴ ᴛᴇᴍɪᴢ ᴋᴀʟᴍᴀsıɴı sᴀğʟᴀʀ.\n\nTᴇᴍɪᴢ ᴍᴏᴅᴜ /settings üᴢᴇʀɪɴᴅᴇɴ ᴀçıᴘ ᴋᴀᴘᴀᴛıɴ [__Vᴀʀsᴀʏıʟᴀɴ ᴏʟᴀʀᴀᴋ ᴀçıᴋ__]"
