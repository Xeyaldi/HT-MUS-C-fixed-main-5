sug_11 : "Sᴇsʟɪ sᴏʜʙᴇᴛɪɴ **Sᴇs Kᴀʟɪᴛᴇsɪɴɪ** Düşüᴋ, Oʀᴛᴀ ʏᴀ ᴅᴀ Yüᴋsᴇᴋ ᴏʟᴀʀᴀᴋ ᴀʏᴀʀʟᴀʏᴀʙɪʟɪʀsɪɴɪᴢ.\n\nKᴀʟɪᴛᴇʏɪ /settings ɪʟᴇ ᴀʏᴀʀʟᴀʏıɴ"
