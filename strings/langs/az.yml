start_3 : "ʜᴇʏ {0},\nʙᴜ {1}-ᴅıʀ\n\nᴍəɴɪ {2} çᴀᴛıɴᴀ əʟᴀᴠə ᴇᴛᴅɪʏɪɴɪᴢ üçüɴ ᴛəşəᴋᴋüʀʟəʀ, {3} ɪɴᴅɪ ʙᴜ çᴀᴛᴅᴀ ᴍᴀʜɴı s_əs_ʟəɴᴅɪʀə ʙɪʟəʀ."
start_4 : "🎄 <b>s_ᴜᴘᴇʀɢʀᴜᴘ ᴛəʟəʙ ᴏʟᴜɴᴜʀ</b> 🎄\n\nxᴀʜɪş ᴏʟᴜɴᴜʀ <b>ǫʀᴜᴘᴜɴᴜᴢᴜ</b> <b>s_ᴜᴘᴇʀɢʀᴜᴘ</b>-ᴀ ᴄ_ᴇᴠɪʀɪɴ ᴠə s_ᴏɴʀᴀ ᴍəɴɪ ʏᴇɴɪᴅəɴ əʟᴀᴠə ᴇᴅɪɴ.\n\n<b>s_ᴜᴘᴇʀɢʀᴜᴘ ɴᴇᴄ_ə ʏᴀʀᴀᴅıʟıʀ?</b>\n- ǫʀᴜᴘᴜɴᴜᴢᴜɴ çᴀᴛ ᴛᴀʀɪxçəs_ɪɴɪ <b>ɢörünən</b> ᴇᴅɪɴ."
start_5 : "<b>↝ ǫᴀʀᴀ s_ɪʏᴀʜıᴅᴀᴋı çᴀᴛ ↜</b>\n\nʙᴜ çᴀᴛ {0} ᴅᴀᴛᴀʙᴀᴢᴀs_ıɴᴅᴀ ǫᴀʀᴀ s_ɪʏᴀʜıᴅᴀᴅıʀ.\nçᴀᴛı s_ɪʏᴀʜıᴅᴀɴ çıxᴀʀᴍᴀǫ üçüɴ <a href={1}>s_ᴜᴅᴏ ɪsᴛɪғᴀᴅəçɪs_ɪɴᴅəɴ</a> xᴀʜɪş ᴇᴅɪɴ ᴠə ʏᴀ <a href={2}>ᴅəs_ᴛəᴋ çᴀᴛıɴᴀ ᴋᴇçɪɴ.</a>"
