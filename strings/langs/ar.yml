sug_2 : "يمكنك تشغيل الموسيقى في **نوعي تشغيل**: وضع الجميع ووضع المشرفين.\n\nغيّر الأوضاع عبر /playmode"
sug_3 : "يمكنك تشغيل الموسيقى في **القنوات** أيضاً.\n\nحدد معرف القناة عبر /channelplay وشغّل عبر /cplay"
sug_4 : "يمكن لغير المشرفين استخدام أوامر المشرفين أيضاً بإضافتهم إلى **قائمة المستخدمين المصرح لهم**.\nأضف أي مستخدم بـ /auth، واحذفه بـ /unauth، وتحقق من القائمة عبر /authusers"
sug_5 : "يحتوي البوت على ميزة تسمى **الوضع النظيف**.\nيحذف رسائل البوت بعد 5 دقائق ويحافظ على نظافة الدردشة.\n\nفعّل أو عطّل الوضع النظيف عبر /settings [__مفعّل افتراضياً__]"
sug_6 : "يمكنك تشغيل مقاطع وقوائم **Spotify** أيضاً.\n\nابدأ التشغيل الآن بـ /play [رابط Spotify]"
sug_7 : "يمكنك تشغيل مقاطع وقوائم **Apple Music** أيضاً.\n\nابدأ التشغيل الآن بـ /play [رابط Apple]"
sug_8 : "يمكنك تشغيل مقاطع وقوائم **Resso Music** أيضاً.\n\nابدأ التشغيل الآن بـ /play [رابط Resso]"
sug_9 : "يمكنك تشغيل مقاطع وقوائم **Sound Cloud** أيضاً.\n\nابدأ التشغيل الآن بـ /play [رابط SoundCloud]"
sug_10 : "يمكنك تشغيل **الفيديوهات** في المكالمة الصوتية عبر /vplay [اسم الفيديو] أو /play -v [اسم الفيديو]"
sug_11 : "يمكنك ضبط **جودة الصوت** للمكالمة الصوتية إلى منخفضة أو متوسطة أو عالية.\n\nاضبط الجودة عبر /settings"
sug_12 : "يمكنك ضبط **جودة الفيديو** للمكالمة الصوتية إلى منخفضة أو متوسطة أو عالية.\n\nاضبط الجودة عبر /settings"
sug_13 : "يمكنك التحقق من **إحصائياتك** على البوت مثل أفضل 10 مقاطع مشغلة.\n\nالإحصائيات: /gstats"
sug_14 : "يمكنك التحقق من **إحصائيات المجموعة** على البوت مثل أفضل 10 مقاطع مشغلة.\n\nالإحصائيات: /gstats"
sug_15 : "يمكنك التحقق من **الإحصائيات العالمية** للبوت مثل أفضل 10 مستخدمين وأفضل 10 دردشات وأفضل 10 مقاطع.\n\nالإحصائيات: /gstats"
sug_16 : "يمكنك الآن كتم الموسيقى التي تعمل في المكالمة الصوتية.\n\nالأمر: /mute"
sug_17 : "يمكنك الآن كتم وإلغاء كتم الموسيقى التي تعمل في المكالمة الصوتية.\n\nالأمر: /mute و /unmute"
sug_18 : "يمكنك أيضاً البحث عن كلمات الأغاني معنا..\n\nالأمر: /lyrics [اسم الموسيقى]"
sug_19 : "يمكنك تنزيل الموسيقى أو الفيديو من البوت عبر يوتيوب.\n\nالأمر: /song [اسم الموسيقى]"
sug_20 : "يمكنك الحصول على قائمة كاملة بالأوامر التي أقبلها.\n\nالأمر: /help"
sug_21 : "يحتوي البوت على خيار قائمة تشغيل من جانب الخادم.\n\nيمكنك إضافة موسيقى إلى قائمتك وتشغيلها جميعاً عبر /play"
sug_22 : "يمكنك الآن خلط الموسيقى في قائمة انتظار البوت.\n\nالأمر: /shuffle"
sug_23 : "يمكنك التحقق من قائمة انتظار الموسيقى.\n\nالأمر: /queue"
sug_24 : "يمكنك التحقق من مالكي ومستخدمي sudo الذين يديرونني.\n\nالأمر: /sudolist"
sug_25 : "يحتوي البوت على ميزة تسمى **وضع حذف الأوامر**. يحذف الأوامر المنفذة تلقائياً.\n\nفعّل أو عطّل وضع الحذف عبر /settings [__مفعّل افتراضياً__]"
sug_26 : "يمكنك تغيير لغة البوت إلى اللغات المتاحة لفهم أسهل.\n\nالأمر: /language"
sug_27 : "انتهى أخيراً😂"
