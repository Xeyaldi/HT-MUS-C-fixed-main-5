sug_8 : "**Rᴇssᴏ Mᴜsɪᴄ** ᴘᴀʀçᴀʟᴀʀıɴı ᴠᴇ ᴏʏɴᴀᴛᴍᴀ ʟɪsᴛᴇʟᴇʀɪɴɪ ᴅᴇ çᴀʟᴀʙɪʟɪʀsɪɴɪᴢ.\n\nHᴇᴍᴇɴ /play [Rᴇssᴏ Lɪɴᴋɪ] ɪʟᴇ çᴀʟᴍᴀʏᴀ ʙᴀşʟᴀʏıɴ"
