sug_13 : "Bᴏᴛᴛᴀ Eɴ Çᴏᴋ Çᴀʟıɴᴀɴ İʟᴋ 10 Pᴀʀçᴀ ɢɪʙɪ **İsᴛᴀᴛɪsᴛɪᴋʟᴇʀɪɴɪᴢɪ** ᴋᴏɴᴛʀᴏʟ ᴇᴅᴇʙɪʟɪʀsɪɴɪᴢ.\n\nİsᴛᴀᴛɪsᴛɪᴋʟᴇʀ: /gstats "
sug_14 : "Bᴏᴛᴛᴀ Eɴ Çᴏᴋ Çᴀʟıɴᴀɴ İʟᴋ 10 Pᴀʀçᴀ ɢɪʙɪ **Gʀᴜᴘ İsᴛᴀᴛɪsᴛɪᴋʟᴇʀɪɴɪ** ᴋᴏɴᴛʀᴏʟ ᴇᴅᴇʙɪʟɪʀsɪɴɪᴢ.\n\nİsᴛᴀᴛɪsᴛɪᴋʟᴇʀ: /gstats "
sug_15 : "Bᴏᴛᴜɴ ɪʟᴋ 10 ᴋᴜʟʟᴀɴıᴄı, ɪʟᴋ 10 sᴏʜʙᴇᴛ, ɪʟᴋ 10 ᴘᴀʀçᴀ ɢɪʙɪ **Küʀᴇsᴇʟ İsᴛᴀᴛɪsᴛɪᴋʟᴇʀɪɴɪ** ᴋᴏɴᴛʀᴏʟ ᴇᴅᴇʙɪʟɪʀsɪɴɪᴢ.\n\nİsᴛᴀᴛɪsᴛɪᴋʟᴇʀ: /gstats "
sug_16 : "Aʀᴛıᴋ sᴇsʟɪ sᴏʜʙᴇᴛᴛᴇ çᴀʟᴀɴ ᴍüᴢɪğɪ sᴇssɪᴢᴇ ᴀʟᴀʙɪʟɪʀsɪɴɪᴢ.\n\nKᴏᴍᴜᴛ: /mute"
sug_17 : "Aʀᴛıᴋ sᴇsʟɪ sᴏʜʙᴇᴛᴛᴇ çᴀʟᴀɴ ᴍüᴢɪğɪɴ sᴇsɪɴɪ ᴀçıᴘ ᴋᴀᴘᴀᴛᴀʙɪʟɪʀsɪɴɪᴢ.\n\nKᴏᴍᴜᴛ: /mute ᴠᴇ /unmute"
sug_18 : "Müᴢɪᴋʟᴇʀɪɴ şᴀʀᴋı söᴢʟᴇʀɪɴɪ ʙɪᴢɪᴍʟᴇ ᴅᴇ ᴀʀᴀʏᴀʙɪʟɪʀsɪɴɪᴢ..\n\nKᴏᴍᴜᴛ: /lyrics [Müᴢɪᴋ Aᴅı]"
sug_19 : "Bᴏᴛ üᴢᴇʀɪɴᴅᴇɴ Yᴏᴜᴛᴜʙᴇ'ᴅᴀɴ ᴍüᴢɪᴋ ʏᴀ ᴅᴀ ᴠɪᴅᴇᴏ ɪɴᴅɪʀᴇʙɪʟɪʀsɪɴɪᴢ.\n\nKᴏᴍᴜᴛ: /song [Müᴢɪᴋ Aᴅı]"
sug_20 : "Kᴀʙᴜʟ ᴇᴛᴛɪğɪᴍ ᴋᴏᴍᴜᴛʟᴀʀıɴ ᴛᴀᴍ ʟɪsᴛᴇsɪɴɪ ᴀʟᴀʙɪʟɪʀsɪɴɪᴢ.\n\nKᴏᴍᴜᴛ: /help"
sug_21 : "Bᴏᴛᴛᴀ sᴜɴᴜᴄᴜ ᴛᴀʀᴀғʟı ᴏʏɴᴀᴛᴍᴀ ʟɪsᴛᴇsɪ sᴇçᴇɴᴇğɪ ᴠᴀʀ.\n\nOʏɴᴀᴛᴍᴀ ʟɪsᴛᴇɴɪᴢᴇ ᴍüᴢɪᴋ ᴇᴋʟᴇʏɪᴘ /play ɪʟᴇ ʜᴇᴘsɪɴɪ ʙɪʀʟɪᴋᴛᴇ çᴀʟᴀʙɪʟɪʀsɪɴɪᴢ"
sug_22 : "Aʀᴛıᴋ ʙᴏᴛᴛᴀ sıʀᴀʏᴀ ᴀʟıɴᴍış ᴍüᴢɪᴋʟᴇʀɪ ᴋᴀʀışᴛıʀᴀʙɪʟɪʀsɪɴɪᴢ.\n\nKᴏᴍᴜᴛ: /shuffle"
sug_23 : "Müᴢɪᴋʟᴇʀɪɴ sıʀᴀsıɴı ᴋᴏɴᴛʀᴏʟ ᴇᴅᴇʙɪʟɪʀsɪɴɪᴢ.\n\nKᴏᴍᴜᴛ: /queue"
sug_24 : "Bᴇɴɪ ʏöɴᴇᴛᴇɴ sᴀʜɪʙɪᴍɪ ᴠᴇ sᴜᴅᴏ ᴋᴜʟʟᴀɴıᴄıʟᴀʀıᴍı ᴋᴏɴᴛʀᴏʟ ᴇᴅᴇʙɪʟɪʀsɪɴɪᴢ.\n\nKᴏᴍᴜᴛ: /sudolist"
sug_25 : "Bᴏᴛᴛᴀ **Kᴏᴍᴜᴛ Sɪʟᴍᴇ Mᴏᴅᴜ** ᴀᴅıɴᴅᴀ ʙɪʀ öᴢᴇʟʟɪᴋ ᴠᴀʀ. Çᴀʟışᴛıʀᴅığı ᴋᴏᴍᴜᴛʟᴀʀı ᴏᴛᴏᴍᴀᴛɪᴋ ᴏʟᴀʀᴀᴋ sɪʟᴇʀ.\n\nSɪʟᴍᴇ ᴍᴏᴅᴜɴᴜ /settings üᴢᴇʀɪɴᴅᴇɴ ᴀçıᴘ ᴋᴀᴘᴀᴛıɴ [__Vᴀʀsᴀʏıʟᴀɴ ᴏʟᴀʀᴀᴋ ᴀçıᴋ__]"
sug_26 : "Kᴏʟᴀʏ ᴀɴʟᴀşıʟᴍᴀsı ɪçɪɴ ʙᴏᴛᴜɴ ᴅɪʟɪɴɪ ᴍᴇᴠᴄᴜᴛ ᴅɪʟʟᴇʀᴇ ᴅᴇğɪşᴛɪʀᴇʙɪʟɪʀsɪɴɪᴢ.\n\nKᴏᴍᴜᴛ: /language"
