sug_1 : "Mᴜsɪǫɪɴɪ ɪᴋɪ **ᴀxᴛᴀʀış ʀᴇᴊɪᴍɪɴᴅə** çᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ: Bɪʀʙᴀşᴀ Rᴇᴊɪᴍ ᴠə Dᴀxɪʟɪ Rᴇᴊɪᴍ.\n\nRᴇᴊɪᴍʟəʀɪ /playmode ɪʟə ᴅəʏɪşɪɴ"
sug_2 : "Mᴜsɪǫɪɴɪ ɪᴋɪ **çᴀʟᴍᴀ ɴöᴠüɴᴅə** çᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ: Həʀ ᴋəs Rᴇᴊɪᴍɪ ᴠə Aᴅᴍɪɴ Rᴇᴊɪᴍɪ.\n\nRᴇᴊɪᴍʟəʀɪ /playmode ɪʟə ᴅəʏɪşɪɴ"
sug_3 : "**Kᴀɴᴀʟʟᴀʀᴅᴀ** ᴅᴀ ᴍᴜsɪǫɪ çᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nᴋᴀɴᴀʟ_ɪᴅ-ɴɪ /channelplay ɪʟə ᴛəʏɪɴ ᴇᴅɪɴ ᴠə /cplay ɪʟə çᴀʟıɴ"
sug_4 : "Aᴅᴍɪɴ ᴏʟᴍᴀʏᴀɴʟᴀʀ ᴅᴀ **SƏLAHİYYƏTLİ İSTİFADƏÇİLƏR SİYAHISI**-ɴᴀ əʟᴀᴠə ᴇᴅɪʟəʀəᴋ ᴀᴅᴍɪɴ əᴍʀʟəʀɪɴᴅəɴ ɪsᴛɪғᴀᴅə ᴇᴅə ʙɪʟəʀ.\nİsᴛɪғᴀᴅəçɪɴɪ /auth ɪʟə əʟᴀᴠə ᴇᴅɪɴ, /unauth ɪʟə çıxᴀʀıɴ ᴠə /authusers ɪʟə sɪʏᴀʜıɴı ʏᴏxʟᴀʏıɴ"
sug_5 : "Bᴏᴛᴅᴀ **Təᴍɪᴢ Rᴇᴊɪᴍ** ᴀᴅʟı ғᴜɴᴋsɪʏᴀ ᴠᴀʀ.\nBᴏᴛᴜɴ ᴍᴇsᴀᴊʟᴀʀıɴı 5 ᴅəǫɪǫəᴅəɴ sᴏɴʀᴀ sɪʟɪʀ ᴠə söʜʙəᴛɪɴɪᴢɪɴ ᴛəᴍɪᴢ ǫᴀʟᴍᴀsıɴı ᴛəᴍɪɴ ᴇᴅɪʀ.\n\nTəᴍɪᴢ ʀᴇᴊɪᴍɪ /settings ɪʟə ᴀç/ʙᴀğʟᴀ [__Sᴛᴀɴᴅᴀʀᴛ ᴏʟᴀʀᴀǫ ᴀᴋᴛɪᴠ__]"
sug_6 : "**Sᴘᴏᴛɪғʏ** ᴍᴀʜɴıʟᴀʀıɴı ᴠə ᴘʟᴀʏʟɪsᴛʟəʀɪɴɪ ᴅə çᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nİɴᴅɪ /play [Sᴘᴏᴛɪғʏ Lɪɴᴋɪ] ɪʟə çᴀʟᴍᴀğᴀ ʙᴀşʟᴀʏıɴ"
sug_7 : "**Aᴘᴘʟᴇ Mᴜsɪᴄ** ᴍᴀʜɴıʟᴀʀıɴı ᴠə ᴘʟᴀʏʟɪsᴛʟəʀɪɴɪ ᴅə çᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nİɴᴅɪ /play [Aᴘᴘʟᴇ Lɪɴᴋɪ] ɪʟə çᴀʟᴍᴀğᴀ ʙᴀşʟᴀʏıɴ"
sug_8 : "**Rᴇssᴏ Mᴜsɪᴄ** ᴍᴀʜɴıʟᴀʀıɴı ᴠə ᴘʟᴀʏʟɪsᴛʟəʀɪɴɪ ᴅə çᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nİɴᴅɪ /play [Rᴇssᴏ Lɪɴᴋɪ] ɪʟə çᴀʟᴍᴀğᴀ ʙᴀşʟᴀʏıɴ"
sug_9 : "**Sᴏᴜɴᴅ Cʟᴏᴜᴅ** ᴍᴀʜɴıʟᴀʀıɴı ᴠə ᴘʟᴀʏʟɪsᴛʟəʀɪɴɪ ᴅə çᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nİɴᴅɪ /play [SᴏᴜɴᴅCʟᴏᴜᴅ Lɪɴᴋɪ] ɪʟə çᴀʟᴍᴀğᴀ ʙᴀşʟᴀʏıɴ"
sug_10 : "Səsʟɪ söʜʙəᴛᴅə /vplay [Vɪᴅᴇᴏ Aᴅı] ʏᴀ ᴅᴀ /play -ᴠ [Vɪᴅᴇᴏ Aᴅı] ɪʟə **Vɪᴅᴇᴏ** çᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ"
sug_11 : "Səsʟɪ söʜʙəᴛɪɴ **Səs Kᴇʏғɪʏʏəᴛɪɴɪ** Aşᴀğı, Oʀᴛᴀ ʏᴀ ᴅᴀ Yüᴋsəᴋ ᴛəʏɪɴ ᴇᴅə ʙɪʟəʀsɪɴɪᴢ.\n\nKᴇʏғɪʏʏəᴛɪ /settings ɪʟə ᴛəʏɪɴ ᴇᴅɪɴ"
sug_12 : "Səsʟɪ söʜʙəᴛɪɴ **Vɪᴅᴇᴏ Kᴇʏғɪʏʏəᴛɪɴɪ** Aşᴀğı, Oʀᴛᴀ ʏᴀ ᴅᴀ Yüᴋsəᴋ ᴛəʏɪɴ ᴇᴅə ʙɪʟəʀsɪɴɪᴢ.\n\nKᴇʏғɪʏʏəᴛɪ /settings ɪʟə ᴛəʏɪɴ ᴇᴅɪɴ"
sug_13 : "Bᴏᴛᴅᴀ əɴ çᴏx çᴀʟıɴᴀɴ ɪʟᴋ 10 ᴍᴀʜɴı ᴋɪᴍɪ **Sᴛᴀᴛɪsᴛɪᴋᴀɴıᴢı** ʏᴏxʟᴀʏᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nSᴛᴀᴛɪsᴛɪᴋᴀ: /gstats"
sug_14 : "Bᴏᴛᴅᴀ əɴ çᴏx çᴀʟıɴᴀɴ ɪʟᴋ 10 ᴍᴀʜɴı ᴋɪᴍɪ **Qʀᴜᴘ Sᴛᴀᴛɪsᴛɪᴋᴀsıɴı** ʏᴏxʟᴀʏᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nSᴛᴀᴛɪsᴛɪᴋᴀ: /gstats"
sug_15 : "Bᴏᴛᴜɴ ɪʟᴋ 10 ɪsᴛɪғᴀᴅəçɪ, ɪʟᴋ 10 söʜʙəᴛ, ɪʟᴋ 10 ᴍᴀʜɴı ᴋɪᴍɪ **Qʟᴏʙᴀʟ Sᴛᴀᴛɪsᴛɪᴋᴀsıɴı** ʏᴏxʟᴀʏᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nSᴛᴀᴛɪsᴛɪᴋᴀ: /gstats"
sug_16 : "İɴᴅɪ səsʟɪ söʜʙəᴛᴅə çᴀʟᴀɴ ᴍᴜsɪǫɪɴɪ səssɪᴢə ᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nƏᴍʀ: /mute"
sug_17 : "İɴᴅɪ səsʟɪ söʜʙəᴛᴅə çᴀʟᴀɴ ᴍᴜsɪǫɪɴɪɴ səsɪɴɪ ᴀçᴀ/ʙᴀğʟᴀʏᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nƏᴍʀ: /mute ᴠə /unmute"
sug_18 : "Mᴀʜɴıʟᴀʀıɴ söᴢʟəʀɪɴɪ ʙɪᴢɪᴍʟə ᴅə ᴀxᴛᴀʀᴀ ʙɪʟəʀsɪɴɪᴢ..\n\nƏᴍʀ: /lyrics [Mᴀʜɴı Aᴅı]"
sug_19 : "Bᴏᴛ üᴢəʀɪɴᴅəɴ Yᴏᴜᴛᴜʙᴇ-ᴅᴀɴ ᴍᴜsɪǫɪ ʏᴀ ᴅᴀ ᴠɪᴅᴇᴏ ᴇɴᴅɪʀə ʙɪʟəʀsɪɴɪᴢ.\n\nƏᴍʀ: /song [Mᴀʜɴı Aᴅı]"
sug_20 : "Qəʙᴜʟ ᴇᴛᴅɪʏɪᴍ əᴍʀʟəʀɪɴ ᴛᴀᴍ sɪʏᴀʜısıɴı əʟᴅə ᴇᴅə ʙɪʟəʀsɪɴɪᴢ.\n\nƏᴍʀ: /help"
sug_21 : "Bᴏᴛᴅᴀ sᴇʀᴠᴇʀ ᴛəʀəғʟɪ ᴘʟᴀʏʟɪsᴛ sᴇçɪᴍɪ ᴠᴀʀ.\n\nPʟᴀʏʟɪsᴛɪɴɪᴢə ᴍᴜsɪǫɪ əʟᴀᴠə ᴇᴅɪʙ ʜᴀᴍısıɴı ʙɪʀʟɪᴋᴅə /play ɪʟə çᴀʟᴀ ʙɪʟəʀsɪɴɪᴢ"
sug_22 : "İɴᴅɪ ʙᴏᴛᴅᴀ sıʀᴀʏᴀ ᴀʟıɴᴍış ᴍᴜsɪǫɪʟəʀɪ ǫᴀʀışᴅıʀᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nƏᴍʀ: /shuffle"
sug_23 : "Mᴜsɪǫɪʟəʀɪɴ sıʀᴀsıɴı ʏᴏxʟᴀʏᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nƏᴍʀ: /queue"
sug_24 : "Məɴɪ ɪᴅᴀʀə ᴇᴅəɴ sᴀʜɪʙɪᴍɪ ᴠə sᴜᴅᴏ ɪsᴛɪғᴀᴅəçɪʟəʀɪᴍɪ ʏᴏxʟᴀʏᴀ ʙɪʟəʀsɪɴɪᴢ.\n\nƏᴍʀ: /sudolist"
sug_25 : "Bᴏᴛᴅᴀ **Əᴍʀ Sɪʟᴍə Rᴇᴊɪᴍɪ** ᴀᴅʟı ғᴜɴᴋsɪʏᴀ ᴠᴀʀ. İᴄʀᴀ ᴇᴛᴅɪʏɪ əᴍʀʟəʀɪ ᴀᴠᴛᴏᴍᴀᴛɪᴋ sɪʟɪʀ.\n\nSɪʟᴍə ʀᴇᴊɪᴍɪɴɪ /settings ɪʟə ᴀç/ʙᴀğʟᴀ [__Sᴛᴀɴᴅᴀʀᴛ ᴏʟᴀʀᴀǫ ᴀᴋᴛɪᴠ__]"
